global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    monitor: 'sinan-monitor'
    environment: 'production'

# 告警规则文件
rule_files:
  - "rules/*.yml"

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # ============================================================
  # 1. Prometheus 自身监控
  # ============================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          role: 'monitoring'

  # ============================================================
  # 2. Rust 后端服务指标
  # ============================================================
  - job_name: 'sinan-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8080']
        labels:
          service: 'sinan-backend'
          role: 'application'
    scrape_interval: 10s
    scrape_timeout: 5s

    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.*):\d+'
        replacement: '$1'

  # ============================================================
  # 3. ClickHouse 指标
  # ============================================================
  - job_name: 'clickhouse'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['clickhouse:9363']
        labels:
          service: 'clickhouse'
          role: 'database'
    scrape_interval: 30s
    scrape_timeout: 10s

  # ============================================================
  # 4. cAdvisor (Docker 容器监控)
  # ============================================================
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'cadvisor'
          role: 'container-monitor'
    scrape_interval: 30s

  # ============================================================
  # 5. Node Exporter (主机监控)
  # ============================================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          role: 'host-monitor'
    scrape_interval: 30s

  # ============================================================
  # 6. Mosquitto MQTT Broker 指标
  # ============================================================
  - job_name: 'mosquitto'
    static_configs:
      - targets: ['mosquitto-exporter:9234']
        labels:
          service: 'mosquitto'
          role: 'mqtt-broker'
    scrape_interval: 30s
